// Top-level build file where you can add configuration options common to all sub-projects/modules.
// NOTE: buildscript{} is always evaluated first by Gradle, so ext properties from apply from: are
// not available inside it. Kotlin version is hardcoded here; all other SDK vars live in variables.gradle.
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.21"
        // kotlin-compose-compiler-plugin resolved via pluginManagement in settings.gradle

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
