plugins {
    id 'com.android.application'                              // resolved from buildscript classpath
    id 'org.jetbrains.kotlin.android'                         // resolved from buildscript classpath
    id 'org.jetbrains.kotlin.plugin.compose' version '2.0.21' // resolved from pluginManagement repos
}

android {
    namespace = "com.sciencebasedhealth.sbh"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.sciencebasedhealth.sbh"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // Set via Gradle -P flags in CI (VERSION_CODE, VERSION_NAME), fallback to env vars
        versionCode Integer.parseInt(project.findProperty("VERSION_CODE") ?: System.getenv("VERSION_CODE") ?: "1")
        versionName (project.findProperty("VERSION_NAME") ?: System.getenv("VERSION_NAME") ?: "1.0").toString()
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            storeFile file(System.getenv("KEYSTORE_PATH") ?: "sbh-release.keystore")
            storePassword System.getenv("ANDROID_STORE_PASSWORD") ?: ""
            keyAlias System.getenv("ANDROID_KEY_ALIAS") ?: "sbh"
            keyPassword System.getenv("ANDROID_KEY_PASSWORD") ?: ""
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    buildFeatures {
        compose = true
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

// JVM Toolchain: forces BOTH compileJava and compileKotlin to use JDK 17,
// regardless of which JDK runs Gradle (CI uses JDK 21). This is the only
// reliable fix for the AGP 8+ JVM-target validation check.
kotlin {
    jvmToolchain(17)
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')

    // Jetpack Glance home-screen widgets
    implementation platform("androidx.compose:compose-bom:$composeBomVersion")
    implementation "androidx.glance:glance-appwidget:$glanceVersion"
    implementation "androidx.glance:glance-material3:$glanceVersion"
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlinVersion"
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
