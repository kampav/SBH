name: Daily Notifications (CRON)

# Triggers the /api/fcm/send-daily endpoint every day at 20:00 UTC.
# Requires CRON_SECRET and CLOUD_RUN_URL to be set as GitHub secrets.
#
# To set up:
#   1. Add CRON_SECRET to GitHub secrets (same value as Cloud Run env var)
#   2. Add CLOUD_RUN_URL = https://sbh-app-m3nvdpbv4q-nw.a.run.app
#   3. Optionally, also create a Google Cloud Scheduler job that calls the
#      same endpoint directly (recommended for reliability in production):
#        gcloud scheduler jobs create http sbh-daily-notif \
#          --schedule="0 20 * * *" --time-zone="UTC" \
#          --uri="${CLOUD_RUN_URL}/api/fcm/send-daily" \
#          --http-method=POST \
#          --headers="Authorization=Bearer ${CRON_SECRET}" \
#          --location=europe-west2

on:
  schedule:
    - cron: '0 20 * * *'   # 20:00 UTC daily (8 pm)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  send-daily-notifications:
    name: Send Daily FCM Notifications
    runs-on: ubuntu-latest

    steps:
      - name: Trigger /api/fcm/send-daily
        run: |
          HTTP_STATUS=$(curl -sf -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.CLOUD_RUN_URL }}/api/fcm/send-daily")

          cat /tmp/response.json
          echo ""

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "ERROR: /api/fcm/send-daily returned HTTP $HTTP_STATUS"
            exit 1
          fi

          echo "Done — HTTP $HTTP_STATUS"
