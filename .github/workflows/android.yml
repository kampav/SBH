name: Build Android (AAB + APK)

# Builds on every push to master.
# • If ANDROID_KEYSTORE_BASE64 is configured → signed release AAB + debug APK
# • If signing secrets are absent           → debug APK only (no failure)

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 2.1.0)'
        required: false
        default: '2.1.0'

env:
  VERSION_CODE: ${{ github.run_number }}
  VERSION_NAME: ${{ github.event.inputs.version_name || '2.1.0' }}

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed for gh release create

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Java 21
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Node dependencies
        run: SENTRYCLI_SKIP_DOWNLOAD=1 npm ci

      - name: Sync Capacitor (bundles web content into Android project)
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      # ── Check whether signing secrets are available ────────────────────────
      - name: Check signing configuration
        id: signing
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
            echo "Signing secrets found — will build signed release AAB"
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "ANDROID_KEYSTORE_BASE64 not set — building debug APK only"
          fi

      # ── Signed release AAB (only when keystore is available) ──────────────
      - name: Decode keystore
        if: steps.signing.outputs.configured == 'true'
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/sbh-release.keystore

      - name: Build signed release AAB
        if: steps.signing.outputs.configured == 'true'
        working-directory: android
        env:
          KEYSTORE_PATH: sbh-release.keystore
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}
        run: |
          ./gradlew bundleRelease --no-daemon \
            "-Dorg.gradle.java.home=$JAVA_HOME" \
            "-PVERSION_CODE=$VERSION_CODE" \
            "-PVERSION_NAME=$VERSION_NAME"

      - name: Upload signed AAB artifact
        if: steps.signing.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sbh-release-${{ github.run_number }}.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── Debug APK (always built) ───────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}
        run: ./gradlew assembleDebug --no-daemon "-Dorg.gradle.java.home=$JAVA_HOME"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbh-debug-${{ github.run_number }}.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Rolling "latest" GitHub Release ───────────────────────────────────
      - name: Update rolling "latest" GitHub Release with debug APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk sbh-latest.apk

          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

          gh release create latest sbh-latest.apk \
            --title "SBH Latest Debug APK (build ${{ github.run_number }})" \
            --notes "Auto-built from master — build ${{ github.run_number }}. Sideload APK for direct Android install. See CHANGELOG.md for details." \
            --prerelease \
            --target master

      # ── Cleanup ───────────────────────────────────────────────────────────
      - name: Clean up keystore
        if: always()
        run: rm -f android/app/sbh-release.keystore
